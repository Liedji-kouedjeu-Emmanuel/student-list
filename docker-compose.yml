version: "3.8"
services:
  api:
    image: student_list_api:v1
    container_name: student_list_api
    ports:
      - "5000:5000"
    volumes:
      - ./simple_api/student_age.json:/data/student_age.json
    networks:
      - student_network
  website:
    image: php:apache
    container_name: student_list_website
    environment:
      - USERNAME=toto
      - PASSWORD=python
    ports:
      - "80:80"
    volumes:
      - ./website:/var/www/html
    depends_on:
      - api
    networks:
      - student_network
networks:
  student_network:
    driver: bridge
